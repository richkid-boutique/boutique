<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RichKid-boutique | Luxury Collection</title>
    <style>
        :root { --gold: #D4AF37; --magenta: #C70066; --black: #111; --white: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--white); color: var(--black); padding-bottom: 120px; overflow-x: hidden; }
        
        .slideshow-container { width: 100%; height: 350px; position: relative; overflow: hidden; background-color: #fff; }
        .slide { display: none; width: 100%; height: 100%; object-fit: contain; }

        .inner-circle { background: var(--black); color: var(--gold); padding: 22px; text-align: center; border-bottom: 3px solid var(--gold); }
        .inner-circle h3 { margin: 0 0 5px 0; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }
        .handle { color: var(--magenta); font-weight: bold; }
        .insta-btn { display: inline-block; margin-top: 12px; background: var(--gold); color: #000; padding: 12px 25px; text-decoration: none; font-weight: bold; font-size: 11px; border-radius: 25px; text-transform: uppercase; }

        .filter-menu { display: flex; overflow-x: auto; background: #fff; padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; gap: 10px; }
        .filter-btn { padding: 10px 22px; border: 1px solid #ddd; background: #fff; border-radius: 25px; font-size: 11px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: var(--black); color: #fff; border-color: var(--black); }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .product-card { border: 1px solid #f2f2f2; border-radius: 8px; overflow: hidden; display: none; flex-direction: column; background: #fff; }
        .product-image { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .product-info { padding: 12px; text-align: center; }
        .price-tag { color: var(--magenta); font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        .add-btn { background: var(--black); color: white; border: none; width: 100%; padding: 14px; font-size: 11px; font-weight: bold; text-transform: uppercase; border-radius: 5px; cursor: pointer; }

        .cart-float { position: fixed; bottom: 20px; left: 5%; width: 90%; background: var(--gold); color: #fff; padding: 20px 0; border-radius: 50px; font-weight: bold; text-align: center; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; }
    </style>
</head>
<body>

    <div class="slideshow-container" id="slideshow">
        <img class="slide" src="hero1.png" onerror="this.src='hero1.jpg'; this.onerror=function(){this.remove();}">
        <img class="slide" src="hero2.png" onerror="this.src='hero2.jpg'; this.onerror=function(){this.remove();}">
        <img class="slide" src="hero3.png" onerror="this.src='hero3.jpg'; this.onerror=function(){this.remove();}">
        <img class="slide" src="hero4.png" onerror="this.src='hero4.jpg'; this.onerror=function(){this.remove();}">
        <img class="slide" src="hero5.png" onerror="this.src='hero5.jpg'; this.onerror=function(){this.remove();}">
        <img class="slide" src="hero6.png" onerror="this.src='hero6.jpg'; this.onerror=function(){this.remove();}">
    </div>

    <div class="inner-circle">
        <h3>JOIN THE INNER CIRCLE</h3>
        <p>Follow <span class="handle">@richKid_boutique.cs</span></p>
        <a href="https://instagram.com/richKid_boutique.cs" class="insta-btn" target="_blank">Follow Instagram</a>
    </div>

    <div class="filter-menu">
        <button class="filter-btn active" onclick="showCategory('bikini', this)">Bikinis</button>
        <button class="filter-btn" onclick="showCategory('dress', this)">Dresses</button>
        <button class="filter-btn" onclick="showCategory('three-piece', this)">3-Piece</button>
        <button class="filter-btn" onclick="showCategory('cover-up', this)">Cover-Ups</button>
        <button class="filter-btn" onclick="showCategory('new', this)">New</button>
        <button class="filter-btn" onclick="showCategory('deals', this)">Deals</button>
    </div>

    <div id="product-display" class="product-grid"></div>

    <button class="cart-float" onclick="checkoutWhatsApp()">
        Checkout via WhatsApp (<span id="cart-count">0</span>)
    </button>

    <script>
        let cart = [];
        let slideIndex = 0;

        // Manual Price Lists (100 slots each)
        const inventory = {
            'bikini': { prefix: 'bikini', label: 'Bikini', prices: Array(100).fill("5,500") },
            'dress': { prefix: 'dress', label: 'Dress', prices: Array(100).fill("7,500") },
            'three-piece': { prefix: 'three-piece', label: '3-Piece', prices: Array(100).fill("8,500") },
            'cover-up': { prefix: 'cover-up', label: 'Cover-Up', prices: Array(100).fill("4,500") },
            'new': { prefix: 'new', label: 'New Arrival', prices: Array(100).fill("6,500") },
            'deals': { prefix: 'deal', label: 'Hot Deal', prices: Array(100).fill("3,500") }
        };

        function startSlideshow() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}
            if(slides[slideIndex-1]) slides[slideIndex-1].style.display = "block";
            setTimeout(startSlideshow, 5000);
        }

        function showCategory(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const container = document.getElementById('product-display');
            container.innerHTML = '';
            const data = inventory[category];

            for (let i = 1; i <= 100; i++) {
                const card = document.createElement('div');
                card.className = 'product-card';
                const price = data.prices[i-1];

                card.innerHTML = `
                    <img src="${data.prefix}${i}.png" class="product-image" 
                         onerror="this.src='${data.prefix}${i}.jpg'; this.onerror=function(){this.closest('.product-card').remove();}" 
                         onload="this.closest('.product-card').style.display='flex'">
                    <div class="product-info">
                        <div class="price-tag">$${price} JMD</div>
                        <button class="add-btn" onclick="addToCart('${data.label} #${i}', '${price}')">Add to Bag</button>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        function addToCart(item, price) {
            cart.push(`${item} ($${price})`);
            document.getElementById('cart-count').innerText = cart.length;
        }

        function checkoutWhatsApp() {
            if(cart.length === 0) return alert("Bag is empty!");
            let msg = "Hello RichKid-boutique! 👑 I'd like to order: " + cart.join(", ");
            window.open("https://wa.me/18763047407?text=" + encodeURIComponent(msg));
        }

        window.onload = () => {
            startSlideshow();
            showCategory('bikini', document.querySelector('.filter-btn.active'));
        };
    </script>
</body>
</html>
