<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RichKid-boutique | Luxury Collection</title>
    <style>
        :root { --gold: #D4AF37; --magenta: #C70066; --black: #111; --white: #fff; }
        
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--white); color: var(--black); padding-bottom: 100px; }

        .header-banner { width: 100%; height: 140px; background: url('hero-banner.jpg') center/cover repeat; background-color: #000; }
        
        .inner-circle { background: var(--black); color: var(--gold); padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .inner-circle h3 { margin: 0 0 5px 0; font-size: 16px; letter-spacing: 2px; }
        .inner-circle p { margin: 0; font-size: 12px; color: #fff; opacity: 0.8; }
        .handle { color: var(--magenta); font-weight: bold; }
        .insta-btn { display: inline-block; margin-top: 12px; background: var(--gold); color: #000; padding: 10px 25px; text-decoration: none; font-weight: bold; font-size: 11px; border-radius: 25px; text-transform: uppercase; }

        .search-container { padding: 15px; }
        .search-input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 14px; background: #f9f9f9; outline: none; }

        .filter-menu { display: flex; overflow-x: auto; background: #fff; padding: 10px 15px 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; gap: 8px; scrollbar-width: none; }
        .filter-menu::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 10px 22px; border: 1px solid #ddd; background: #fff; border-radius: 25px; font-size: 11px; font-weight: bold; cursor: pointer; white-space: nowrap; text-transform: uppercase; }
        .filter-btn.active { background: var(--black); color: #fff; border-color: var(--black); }
        .filter-btn.special { border-color: var(--magenta); color: var(--magenta); }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .product-card { border: 1px solid #f2f2f2; border-radius: 6px; overflow: hidden; background: #fff; display: flex; flex-direction: column; }
        .product-image { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .product-info { padding: 12px; text-align: center; }
        .price-tag { color: var(--magenta); font-weight: bold; font-size: 15px; margin-bottom: 10px; }
        .size-select { width: 100%; padding: 8px; font-size: 12px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 4px; }
        .add-btn { background: var(--black); color: white; border: none; width: 100%; padding: 12px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; }

        .wall-of-fame { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px; }
        .fame-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 1px solid #f0f0f0; }

        .cart-float { position: fixed; bottom: 25px; left: 5%; width: 90%; background: var(--gold); color: #fff; padding: 18px 0; border-radius: 40px; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; cursor: pointer; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header-banner"></div>

    <div class="inner-circle">
        <h3>JOIN THE INNER CIRCLE</h3>
        <p>Follow <span class="handle">@richKid_boutique.cs</span> for 10% OFF</p>
        <a href="https://instagram.com/richKid_boutique.cs" class="insta-btn" target="_blank">Follow Instagram</a>
    </div>

    <div class="search-container">
        <input type="text" class="search-input" placeholder="Search (e.g. Dress #1)..." onkeyup="searchItems()">
    </div>

    <div class="filter-menu">
        <button class="filter-btn active" onclick="showSection('items', 'bikini', this)">Bikini</button>
        <button class="filter-btn" onclick="showSection('items', 'three-piece', this)">3-Piece</button>
        <button class="filter-btn" onclick="showSection('items', 'dress', this)">Dress</button>
        <button class="filter-btn" onclick="showSection('items', 'cover-up', this)">Cover-Up</button>
        <button class="filter-btn special" onclick="showSection('items', 'new', this)">New</button>
        <button class="filter-btn special" onclick="showSection('items', 'deals', this)">Hot Deals</button>
        <button class="filter-btn" onclick="showSection('fame', '', this)">Spotted 👑</button>
    </div>

    <div id="items-section">
        <div id="product-display" class="product-grid"></div>
    </div>

    <div id="fame-section" style="display:none;">
        <div style="text-align: center; padding: 25px;">
            <h2 style="text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 18px;">Spotted: Our RichKids</h2>
            <div id="fame-grid" class="wall-of-fame"></div>
        </div>
    </div>

    <div class="cart-float" onclick="checkoutWhatsApp()">
        Checkout via WhatsApp (<span id="cart-count">0</span>)
    </div>

    <script>
        let cart = [];
        const inventory = {
            'bikini': { count: 20, prefix: 'bikini', label: 'Bikini' },
            'three-piece': { count: 24, prefix: 'three-piece', label: '3-Piece Set' },
            'dress': { count: 20, prefix: 'dress', label: 'Dress' },
            'cover-up': { count: 24, prefix: 'cover-up', label: 'Cover-Up' },
            'new': { count: 10, prefix: 'new', label: 'New Arrival' },
            'deals': { count: 10, prefix: 'deal', label: 'Hot Deal 🔥' }
        };

        function showSection(section, category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (section === 'fame') {
                document.getElementById('items-section').style.display = 'none';
                document.getElementById('fame-section').style.display = 'block';
                loadFameGrid();
            } else {
                document.getElementById('items-section').style.display = 'block';
                document.getElementById('fame-section').style.display = 'none';
                filterItems(category);
            }
            window.scrollTo(0,0);
        }

        function filterItems(category) {
            const container = document.getElementById('product-display');
            container.innerHTML = ''; 
            const data = inventory[category];

            for (let i = 1; i <= data.count; i++) {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.setAttribute('data-name', `${data.label} #${i}`);
                
                card.innerHTML = `
                    <img src="${data.prefix}${i}.jpg" class="product-image" onload="this.parentElement.style.display='flex'" onerror="this.parentElement.style.display='none'">
                    <div class="product-info">
                        <div class="price-tag">$PRICE JMD</div>
                        <select id="size-${category}-${i}" class="size-select">
                            <option>Small</option><option>Medium</option><option>Large</option><option>XL</option>
                        </select>
                        <button class="add-btn" onclick="addToCart('${data.label} #${i}', 'size-${category}-${i}')">Add to Bag</button>
                    </div>
                `;
                // Start hidden, only show if image loads
                card.style.display = 'none';
                container.appendChild(card);
            }
        }

        function loadFameGrid() {
            const grid = document.getElementById('fame-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 50; i++) {
                const img = document.createElement('img');
                img.src = `customer${i}.jpg`;
                img.className = 'fame-img';
                img.style.display = 'none'; // Hide initially
                img.onload = function() { this.style.display = 'block'; };
                img.onerror = function() { this.style.display = 'none'; };
                grid.appendChild(img);
            }
        }

        function searchItems() {
            let input = document.querySelector('.search-input').value.toLowerCase();
            let cards = document.querySelectorAll('.product-card');
            cards.forEach(card => {
                if (card.querySelector('img').complete && card.querySelector('img').naturalHeight !== 0) {
                    let name = card.getAttribute('data-name').toLowerCase();
                    card.style.display = name.includes(input) ? "flex" : "none";
                }
            });
        }

        function addToCart(name, sizeId) {
            let size = document.getElementById(sizeId).value;
            cart.push(`${name} (${size})`);
            document.getElementById('cart-count').innerText = cart.length;
        }

        function checkoutWhatsApp() {
            if(cart.length === 0) return alert("Your bag is empty!");
            let msg = "Hello RichKid-boutique! 👑 I'd like to order:\n\n" + cart.join("\n");
            window.open(`https://wa.me/18763047407?text=${encodeURIComponent(msg)}`);
        }

        window.onload = () => filterItems('bikini');
    </script>
</body>
</html>
